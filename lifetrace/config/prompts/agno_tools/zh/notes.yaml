# 搜索
note_search_header: "搜索 \"{keyword}\" 的结果 (共 {count} 项):\n"
note_search_item: "- #{id} {name} (标签: {tags})"
note_search_empty: "未找到包含 \"{keyword}\" 的笔记"

# 按标签筛选
note_list_by_tags_header: "标签 \"{tags}\" 下的笔记 (共 {count} 项):\n"
note_list_by_tags_item: "- #{id} {name} ({date}) 标签: {tags}"
note_list_by_tags_empty: "没有找到标签 \"{tags}\" 下的笔记"

# 按日期筛选
note_list_by_date_header: "{start} ~ {end} 的笔记 (共 {count} 项):\n"
note_list_by_date_item: "- #{id} {name} ({date}) 标签: {tags}"
note_list_by_date_empty: "{start} ~ {end} 没有笔记"

# 洞察
note_insight_header: "📊 笔记 \"{name}\" 的洞察分析:\n\n"
note_insight_similar_header: "📌 相似笔记 (共 {count} 篇):\n"
note_insight_similar_item: "  - #{id} {name} (标签: {tags})"
note_insight_cross_domain_header: "🔗 跨域关联 (共 {count} 篇):\n"
note_insight_cross_domain_item: "  - #{id} {name} (标签: {tags})"
note_insight_no_related: "未找到相关笔记"
note_insight_not_found: "未找到笔记 #{id}"
note_insight_failed: "洞察分析失败: {error}"

# 列出笔记标签
note_tags_header: "所有笔记标签 (共 {count} 个):\n"
note_tags_item: "- {tag} ({count} 篇笔记)"
note_tags_empty: "暂无笔记标签"
note_tags_failed: "获取笔记标签失败: {error}"

# 标签推荐
note_suggest_tags_guide: |
  请根据以下笔记的**完整内容**，推荐 3-5 个合适的标签。

  **笔记 #{note_id}：** {note_name}

  **笔记正文：**
  {note_content}

  **已有标签库（优先复用，也可创建新标签）：** {existing_tags}

  **推荐要求：**
  1. 推荐 3-5 个贴合正文内容的标签
  2. 优先复用已有标签库中的标签
  3. 如已有标签不合适，可创建简洁、有意义的新标签

  ⚠️ 以上只是**建议**，当前**没有**给笔记写入任何标签。
  要真正应用，必须再调用 update_note(note_id={note_id}, tags="标签1,标签2")。
  请先向用户展示推荐标签，再用 update_note 写入，写入后才能告知用户"已添加标签"。


note_suggest_tags_failed: "标签推荐失败: {error}"

# 查看笔记详情
note_get_detail: |
  笔记 #{id} 详情：
  标题：{name}
  日期：{date}
  标签：{tags}
  正文：
  {content}
note_get_failed: "获取笔记详情失败: {error}"

# 通用
note_no_tags: "无标签"