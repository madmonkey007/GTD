# Tag suggestions
note_suggest_tags_guide: |
  Please suggest 3-5 suitable tags based on the note's FULL content below.

  **Note #{note_id}:** {note_name}

  **Note content:**
  {note_content}

  **Existing tag library (prefer reuse, or create new):** {existing_tags}

  **Requirements:**
  1. Suggest 3-5 tags that fit the actual content
  2. Prefer reusing tags from the existing library
  3. If existing tags don't fit, create concise, meaningful new ones

  ⚠️ These are **suggestions only** — no tags have been written to the note.
  To apply them, you must call update_note(note_id={note_id}, tags="tag1,tag2").
  Show the suggestions to the user, then call update_note to write them; only after that may you say "tags added".


note_suggest_tags_failed: "Tag suggestion failed: {error}"

