# Tag suggestions
note_suggest_tags_guide: |
  Please suggest 3-5 suitable tags based on the note name below.

  **Note name:** {note_name}

  **Existing tags (for reference, reuse or create new):** {existing_tags}

  **Requirements:**
  1. Suggest 3-5 relevant tags
  2. Prefer reusing existing tags
  3. Create new tags if existing ones don't fit
  4. Tags should be concise, meaningful, and easy to categorize

  Please directly suggest tags and show results without calling other tools. Format: Suggested tags: tag1, tag2, tag3

note_suggest_tags_failed: "Tag suggestion failed: {error}"

# Common
note_no_tags: "none"